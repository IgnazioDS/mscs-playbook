name: archive-preview

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: archive-preview
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and validate archive artifacts
        run: |
          python scripts/build_knowledge_archive.py
          python scripts/validate_knowledge_archive.py
          python scripts/archive_quality_report.py --output docs/archive/quality-report.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/archive/package-lock.json

      - name: Install archive app dependencies
        working-directory: apps/archive
        run: |
          npm ci

      - name: Run archive search benchmarks
        working-directory: apps/archive
        run: |
          npm run test:search

      - name: Install Playwright browser
        working-directory: apps/archive
        run: |
          npx playwright install --with-deps chromium

      - name: Run archive smoke tests
        working-directory: apps/archive
        run: |
          npm run test:smoke

      - name: Build archive app
        working-directory: apps/archive
        run: |
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/archive/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4
