name: archive

on:
  push:
  pull_request:

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build archive artifacts
        run: |
          python scripts/build_knowledge_archive.py

      - name: Validate archive artifacts
        run: |
          python scripts/validate_knowledge_archive.py

      - name: Check committed archive outputs
        run: |
          git diff --exit-code docs/archive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/archive/package-lock.json

      - name: Install archive app dependencies
        working-directory: apps/archive
        run: |
          npm ci

      - name: Build archive app
        working-directory: apps/archive
        run: |
          npm run build
