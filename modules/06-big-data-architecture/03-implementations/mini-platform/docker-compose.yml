services:
  redpanda:
    image: redpandadata/redpanda:v25.3.6
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bd06admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bd06password}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ls", "/data"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bd06}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bd06}
      POSTGRES_DB: ${POSTGRES_DB:-bd06}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bd06}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:15
    environment:
      POSTGRES_DSN: "dbname=${POSTGRES_DB:-bd06} user=${POSTGRES_USER:-bd06} password=${POSTGRES_PASSWORD:-bd06} host=postgres port=5432"
      MIGRATIONS_DIR: /migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./sql/postgres/migrations:/migrations:ro
      - ./scripts/run-postgres-migrations.sh:/scripts/run-postgres-migrations.sh:ro
    command: ["bash", "/scripts/run-postgres-migrations.sh"]

  clickhouse-migrate:
    image: clickhouse/clickhouse-server:24.1
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      MIGRATIONS_DIR: /migrations
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./sql/clickhouse/migrations:/migrations:ro
      - ./scripts/run-clickhouse-migrations.sh:/scripts/run-clickhouse-migrations.sh:ro
    command: ["bash", "/scripts/run-clickhouse-migrations.sh"]

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/clickhouse/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingest-api:
    build:
      context: .
      dockerfile: services/ingest-api/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        APP_BUILD_SHA: ${APP_BUILD_SHA:-local}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-dev}
      APP_BUILD_SHA: ${APP_BUILD_SHA:-local}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-events.raw}
      POSTGRES_DSN: "dbname=${POSTGRES_DB:-bd06} user=${POSTGRES_USER:-bd06} password=${POSTGRES_PASSWORD:-bd06} host=postgres port=5432"
      INGEST_AUTH_ENABLED: ${INGEST_AUTH_ENABLED:-true}
      INGEST_API_KEYS: ${INGEST_API_KEYS:-local-ingest:local-demo-ingest-key}
      OPERATOR_API_KEYS: ${OPERATOR_API_KEYS:-local-ops:local-demo-ops-key}
      INGEST_ALLOW_INTERACTIVE_DOCS: ${INGEST_ALLOW_INTERACTIVE_DOCS:-true}
      INGEST_MAX_REQUEST_BYTES: ${INGEST_MAX_REQUEST_BYTES:-16384}
      REPLAY_JOB_TIMEOUT_SECONDS: ${REPLAY_JOB_TIMEOUT_SECONDS:-600}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        APP_BUILD_SHA: ${APP_BUILD_SHA:-local}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-dev}
      APP_BUILD_SHA: ${APP_BUILD_SHA:-local}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-events.raw}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-events.dlq}
      KAFKA_GROUP_ID: worker-group
      POSTGRES_DSN: "dbname=${POSTGRES_DB:-bd06} user=${POSTGRES_USER:-bd06} password=${POSTGRES_PASSWORD:-bd06} host=postgres port=5432"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-bd06admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-bd06password}
      MINIO_BUCKET: events
      MINIO_SECURE: ${MINIO_SECURE:-false}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DATABASE: analytics
      WORKER_LEASE_SECONDS: ${WORKER_LEASE_SECONDS:-30}
      REPLAY_RUNNER_POLL_SECONDS: ${REPLAY_RUNNER_POLL_SECONDS:-2}
      REPLAY_JOB_LEASE_SECONDS: ${REPLAY_JOB_LEASE_SECONDS:-30}
      REPLAY_JOB_TIMEOUT_SECONDS: ${REPLAY_JOB_TIMEOUT_SECONDS:-600}
      MAINTENANCE_POLL_SECONDS: ${MAINTENANCE_POLL_SECONDS:-30}
      RETENTION_INGEST_LOG_DAYS: ${RETENTION_INGEST_LOG_DAYS:-30}
      RETENTION_EVENT_PROCESSING_DAYS: ${RETENTION_EVENT_PROCESSING_DAYS:-30}
      RETENTION_DLQ_DAYS: ${RETENTION_DLQ_DAYS:-30}
      RETENTION_REPLAY_JOBS_DAYS: ${RETENTION_REPLAY_JOBS_DAYS:-30}
      RETENTION_AUDIT_LOG_DAYS: ${RETENTION_AUDIT_LOG_DAYS:-90}
      RETENTION_INGEST_REJECTIONS_DAYS: ${RETENTION_INGEST_REJECTIONS_DAYS:-30}
      RETENTION_MINIO_RAW_DAYS: ${RETENTION_MINIO_RAW_DAYS:-30}
      RETENTION_CLICKHOUSE_DAYS: ${RETENTION_CLICKHOUSE_DAYS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully

  replay-runner:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-dev}
        APP_BUILD_SHA: ${APP_BUILD_SHA:-local}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}
    command: ["python", "-u", "app/replay_runner.py"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_VERSION: ${APP_VERSION:-dev}
      APP_BUILD_SHA: ${APP_BUILD_SHA:-local}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-events.raw}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-events.dlq}
      KAFKA_GROUP_ID: replay-runner
      POSTGRES_DSN: "dbname=${POSTGRES_DB:-bd06} user=${POSTGRES_USER:-bd06} password=${POSTGRES_PASSWORD:-bd06} host=postgres port=5432"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-bd06admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-bd06password}
      MINIO_BUCKET: events
      MINIO_SECURE: ${MINIO_SECURE:-false}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DATABASE: analytics
      WORKER_LEASE_SECONDS: ${WORKER_LEASE_SECONDS:-30}
      REPLAY_RUNNER_POLL_SECONDS: ${REPLAY_RUNNER_POLL_SECONDS:-2}
      REPLAY_JOB_LEASE_SECONDS: ${REPLAY_JOB_LEASE_SECONDS:-30}
      REPLAY_JOB_TIMEOUT_SECONDS: ${REPLAY_JOB_TIMEOUT_SECONDS:-600}
      MAINTENANCE_POLL_SECONDS: ${MAINTENANCE_POLL_SECONDS:-30}
      RETENTION_INGEST_LOG_DAYS: ${RETENTION_INGEST_LOG_DAYS:-30}
      RETENTION_EVENT_PROCESSING_DAYS: ${RETENTION_EVENT_PROCESSING_DAYS:-30}
      RETENTION_DLQ_DAYS: ${RETENTION_DLQ_DAYS:-30}
      RETENTION_REPLAY_JOBS_DAYS: ${RETENTION_REPLAY_JOBS_DAYS:-30}
      RETENTION_AUDIT_LOG_DAYS: ${RETENTION_AUDIT_LOG_DAYS:-90}
      RETENTION_INGEST_REJECTIONS_DAYS: ${RETENTION_INGEST_REJECTIONS_DAYS:-30}
      RETENTION_MINIO_RAW_DAYS: ${RETENTION_MINIO_RAW_DAYS:-30}
      RETENTION_CLICKHOUSE_DAYS: ${RETENTION_CLICKHOUSE_DAYS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
  clickhouse_data:
